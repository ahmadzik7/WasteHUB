<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<title>WasteHub — Production Monitoring</title>
<link rel="manifest" href="manifest.json"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --bdr:#30363d;--acc:#58a6ff;--grn:#3fb950;--warn:#f0883e;--red:#f85149;
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#6e7681;
  --font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;--r:8px;
}
body{background:var(--bg);color:var(--tx);font-family:var(--font);font-size:14px;min-height:100vh;}
input,select,button{font-family:var(--font);}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:.5;}
b{font-weight:700;}

/* ── TOPBAR ── */
.topbar{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:9px 16px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;position:sticky;top:0;z-index:100;}
.brand{display:flex;align-items:center;gap:9px;}
.brand-icon{font-size:20px;color:var(--acc);}
.brand-text{display:flex;flex-direction:column;}
.brand-name{font-size:15px;font-weight:600;color:var(--tx);}
.brand-name span{color:var(--acc);}
.brand-sub{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;}
.tp-controls{display:flex;gap:13px;align-items:center;flex:1;flex-wrap:wrap;}
.ctrl{display:flex;align-items:center;gap:6px;}
.ctrl-lbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.pills{display:flex;gap:3px;}
.pill{padding:4px 10px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg3);
  color:var(--tx2);cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .12s;}
.pill.on{background:var(--acc);border-color:var(--acc);color:#000;font-weight:700;}
.pill.shift-on{background:#1c2d42;border-color:var(--acc);color:var(--acc);font-weight:700;}
.shift-lbl{font-size:10px;color:var(--tx3);font-family:var(--mono);}
.date-inp{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);
  padding:5px 7px;border-radius:var(--r);font-family:var(--mono);font-size:12px;}
.date-inp:focus{outline:none;border-color:var(--acc);}
.tp-stats{display:flex;gap:14px;}
.stat{text-align:right;}
.stat-l{display:block;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px;}
.stat-v{font-family:var(--mono);font-size:13px;font-weight:600;}
.tp-btns{display:flex;gap:5px;align-items:center;}
.btn-icon{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);
  width:32px;height:32px;border-radius:var(--r);cursor:pointer;font-size:15px;}
.btn-icon:hover{border-color:var(--acc);color:var(--acc);}
.btn-sheets{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);
  padding:6px 12px;border-radius:var(--r);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;}
.btn-sheets.rdy{border-color:#34a853;color:#34a853;}
.btn-sheets.ok{background:#1c2d1c;border-color:var(--grn);color:var(--grn);}
.btn-sheets.err{background:#2d1619;border-color:var(--red);color:var(--red);}
.btn-xlsx{background:var(--grn);color:#000;border:none;padding:6px 13px;
  border-radius:var(--r);font-weight:700;cursor:pointer;font-size:12px;}
.btn-xlsx:hover{opacity:.85;}
.btn-xlsx:disabled,.btn-sheets:disabled{opacity:.4;cursor:not-allowed;}

/* ── LINE BAR ── */
.line-bar{background:var(--bg2);border-bottom:2px solid var(--bdr);padding:8px 16px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;
  position:sticky;top:56px;z-index:99;}
.lb-lbl{font-size:10px;color:var(--tx2);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap;}
.line-pills{display:flex;gap:4px;flex-wrap:wrap;}
.lp{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;
  border:1px solid var(--bdr);background:var(--bg3);color:var(--tx2);cursor:pointer;
  font-family:var(--mono);font-size:13px;font-weight:600;transition:all .12s;}
.lp:hover{border-color:var(--acc);color:var(--tx);}
.lp.on{background:#1c2d42;border-color:var(--acc);color:var(--acc);}
.lp-cnt{font-size:10px;background:var(--acc);color:#000;padding:1px 5px;border-radius:10px;font-weight:700;}
.machine-pills{display:flex;gap:7px;flex-wrap:wrap;border-left:2px solid var(--bdr);padding-left:10px;}
.mpg{display:flex;align-items:center;gap:3px;}
.mpg-lbl{font-size:10px;color:var(--acc);font-family:var(--mono);font-weight:700;margin-right:2px;}
.mp{padding:3px 8px;border-radius:12px;border:1px solid var(--bdr);background:var(--bg3);
  color:var(--tx3);cursor:pointer;font-family:var(--mono);font-size:11px;transition:all .1s;}
.mp:hover{border-color:var(--warn);color:var(--warn);}
.mp.on{background:#1c2d42;border-color:var(--acc);color:var(--acc);}

/* ── TABNAV ── */
.tabnav{background:var(--bg2);border-bottom:1px solid var(--bdr);display:flex;padding:0 16px;overflow-x:auto;}
.tab{padding:9px 15px;border:none;background:none;color:var(--tx2);cursor:pointer;
  font-size:13px;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .12s;white-space:nowrap;}
.tab.on{color:var(--acc);border-bottom-color:var(--acc);}
.tab:hover{color:var(--tx);}

/* ── MAIN ── */
#main{padding:14px;flex:1;max-width:1400px;width:100%;margin:0 auto;}

/* ── COLLAPSIBLE CARDS ── */
.card{border:1px solid var(--bdr);border-radius:10px;overflow:hidden;background:var(--bg2);margin-bottom:10px;}
.card-head{background:var(--bg3);padding:9px 13px;display:flex;align-items:center;
  justify-content:space-between;border-bottom:1px solid var(--bdr);
  cursor:pointer;user-select:none;transition:background .1s;flex-wrap:wrap;gap:8px;}
.card-head:hover{background:var(--bg4);}
.card-head.open{border-left:3px solid var(--acc);}
.card-head-left,.card-head-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.card-body{display:none;border-top:1px solid var(--bdr);}
.card-body.open{display:block;}
.caret{color:var(--tx3);font-size:11px;flex-shrink:0;}

/* ── LSP (Line Shared Panel) ── */
.lsp{background:#0f1923;padding:12px 13px;}
.lsp-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.lsp-badge{background:#1c3a5e;border:1px solid var(--acc);color:var(--acc);
  padding:2px 9px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;}
.lsp-sub{font-size:10px;color:var(--tx3);}
.lsp-pcs{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--grn);}
.sec-lbl{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;font-weight:600;}
.field-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:11px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;}
.num-in{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);
  padding:5px 7px;border-radius:5px;font-family:var(--mono);font-size:13px;width:100px;text-align:right;}
.num-in:focus{outline:none;border-color:var(--acc);}
.num-in-lg{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);
  padding:7px 10px;border-radius:5px;font-family:var(--mono);font-size:15px;width:130px;text-align:right;}
.num-in-lg:focus{outline:none;border-color:var(--acc);}
.fixed-tag{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--grn);
  padding:5px 9px;background:var(--bg3);border:1px solid var(--bdr);border-radius:5px;}
.pcs-tag{font-family:var(--mono);font-size:11px;color:var(--grn);background:#1f2d1f;
  border:1px solid var(--grn);padding:3px 7px;border-radius:4px;white-space:nowrap;}
.vpills{display:flex;gap:4px;}
.vp{padding:4px 12px;border-radius:20px;border:1px solid var(--bdr);background:var(--bg3);
  color:var(--tx2);cursor:pointer;font-family:var(--mono);font-size:12px;transition:all .12s;}
.vp.on{background:#1f2d1f;border-color:var(--grn);color:var(--grn);font-weight:700;}

/* ── TAGS ── */
.tag-m{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);
  padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;font-weight:600;}
.tag-v{background:#1f2d1f;border:1px solid var(--grn);color:var(--grn);
  padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;}
.tag-w{background:var(--bg3);color:var(--tx2);padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:11px;}
.pct-pill{padding:3px 9px;border-radius:20px;font-family:var(--mono);font-size:12px;font-weight:700;}
.status-ok{background:#1f2d1f;color:var(--grn);border:1px solid var(--grn);padding:3px 9px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;}
.status-over{background:#2d1619;color:var(--red);border:1px solid var(--red);padding:3px 9px;border-radius:20px;font-family:var(--mono);font-size:11px;font-weight:700;}

/* ── WASTE TABLE ── */
.waste-body{padding:11px 13px;background:#101419;}
.machine-tag{font-size:10px;color:var(--tx3);margin-bottom:5px;font-family:var(--mono);}
.wt{border-collapse:collapse;width:100%;max-width:400px;font-size:13px;}
.wt th{background:var(--bg3);color:var(--tx2);padding:6px 10px;text-align:left;
  border:1px solid var(--bdr);font-weight:600;font-size:10px;text-transform:uppercase;}
.wt .th-name{min-width:200px;}
.wt .th-tot{min-width:100px;text-align:center!important;background:#1c2a1c!important;color:var(--grn)!important;}
.wt td{padding:3px 4px;border:1px solid var(--bdr);}
.wt .td-name{padding:5px 10px!important;color:var(--tx);font-size:12px;white-space:nowrap;}
.wt .td-val{background:#1c2a1c22;text-align:center;}
.wt .row-act td{background:rgba(63,185,80,.04);}
.wt .row-act .td-val{background:rgba(63,185,80,.1);}
.wt tr:hover td{background:var(--bg4);}
.wt .tf-row td{background:var(--bg3)!important;border-top:2px solid var(--bdr);}
.tw-num{font-family:var(--mono);font-size:14px;font-weight:700;color:var(--grn);display:block;text-align:center;padding:4px;}
.wi{width:82px;padding:5px 7px;background:var(--bg3);border:1px solid transparent;
  color:var(--tx);border-radius:4px;font-family:var(--mono);font-size:12px;
  text-align:right;display:block;margin:auto;transition:border-color .1s;}
.wi:focus{outline:none;border-color:var(--acc);background:var(--bg4);}
.tw-sum{margin-top:8px;display:flex;justify-content:flex-end;align-items:center;gap:8px;font-size:12px;color:var(--tx2);}
.hint{font-size:10px;color:var(--tx3);margin-top:6px;font-family:var(--mono);}
.btn-del{background:none;border:1px solid transparent;color:var(--tx3);
  width:22px;height:22px;border-radius:4px;cursor:pointer;font-size:11px;}
.btn-del:hover{border-color:var(--red);color:var(--red);background:#2d1619;}

/* ── COUNTER TABLE ── */
.counter-body{padding:11px 13px;background:#101419;overflow-x:auto;}
.ct{border-collapse:collapse;width:100%;font-size:12px;white-space:nowrap;}
.ct th{background:var(--bg3);color:var(--tx2);padding:6px 10px;
  border:1px solid var(--bdr);text-align:center;font-weight:600;font-size:10px;text-transform:uppercase;}
.ct td{padding:4px 6px;border:1px solid var(--bdr);text-align:center;}
.ct .td-m{font-family:var(--mono);font-size:12px;}
.ct tr:hover td{background:var(--bg3);}
.ct .tf-row td{background:var(--bg3)!important;border-top:2px solid var(--bdr);}

/* ── GAGAL FILLING ── */
.gf-hdr{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.kpi-row{display:flex;gap:9px;flex-wrap:wrap;}
.kpi{flex:1;min-width:110px;background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:12px 14px;}
.kpi.hi{border-color:var(--acc);background:#1c2d42;}
.kpi-v{font-family:var(--mono);font-size:19px;font-weight:700;}
.kpi-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}
.kpi-sm{text-align:center;background:var(--bg2);border:1px solid var(--bdr);padding:10px 16px;border-radius:var(--r);}
.kpi-sm-v{font-family:var(--mono);font-size:18px;font-weight:700;}
.kpi-sm-l{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.4px;margin-top:3px;}
.gf-tbl-wrap{overflow-x:auto;}
.gft{border-collapse:collapse;width:100%;max-width:520px;font-size:13px;}
.gft th{background:var(--bg3);color:var(--tx2);padding:7px 12px;
  border:1px solid var(--bdr);text-align:center;font-weight:600;font-size:10px;text-transform:uppercase;}
.gft th:first-child{text-align:left;}
.gft .th-cl{color:var(--grn)!important;}
.gft .th-op{color:var(--warn)!important;}
.gft td{padding:4px 8px;border:1px solid var(--bdr);text-align:center;}
.gft td:first-child{text-align:left;}
.gft tr:hover td{background:var(--bg3);}
.gft .row-act td{background:rgba(88,166,255,.04);}
.gft .tf-row td{background:var(--bg3)!important;border-top:2px solid var(--bdr);}

/* ── KARDUS ── */
.ks-wrap{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:14px;}
.ks-title{background:var(--bg3);padding:8px 13px;font-size:11px;font-weight:700;
  color:var(--acc);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--bdr);}
.kst{border-collapse:collapse;width:100%;font-size:12px;}
.kst th{background:var(--bg3);color:var(--tx2);padding:6px 10px;
  border:1px solid var(--bdr);text-align:center;font-weight:600;font-size:10px;}
.kst td{padding:5px 8px;border:1px solid var(--bdr);text-align:center;}
.kst tr:hover td{background:var(--bg3);}
.kardus-body{padding:13px;background:#101419;}
.ktotal-row{display:flex;align-items:center;gap:14px;margin-bottom:13px;
  padding:10px 12px;background:var(--bg3);border-radius:6px;border:1px solid var(--bdr);flex-wrap:wrap;}
.cause-mismatch{font-size:11px;color:var(--warn);font-family:var(--mono);}
.causes-grid{display:grid;grid-template-columns:1fr;gap:4px;}
.causes-title{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:7px;}
.cause-row{display:flex;align-items:center;justify-content:space-between;
  padding:5px 8px;border-radius:5px;background:var(--bg3);border:1px solid var(--bdr);}
.cause-lbl{font-size:12px;color:var(--tx2);flex:1;}

/* ── SUMMARY ── */
.sum-block{background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;margin-bottom:12px;}
.sum-block-title{background:var(--bg3);padding:8px 13px;font-size:11px;font-weight:700;
  color:var(--tx);border-bottom:1px solid var(--bdr);}
.sum-row{display:flex;align-items:center;gap:8px;padding:8px 13px;
  border-bottom:1px solid var(--bdr);flex-wrap:wrap;}
.sum-row:last-child{border-bottom:none;}
.sum-stat{font-size:12px;color:var(--tx2);}
.bd-grid{padding:13px;display:flex;flex-direction:column;gap:7px;}
.bd-row{display:flex;align-items:center;gap:8px;}
.bd-name{font-size:11px;color:var(--tx2);min-width:200px;}
.bd-bar-bg{flex:1;height:7px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.bd-bar{height:100%;background:var(--acc);border-radius:4px;transition:width .3s;}
.bd-nums{min-width:90px;text-align:right;display:flex;gap:8px;justify-content:flex-end;font-family:var(--mono);font-size:11px;}
.bd-pct{color:var(--tx3);}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--tx3);}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-title{font-size:16px;font-weight:600;color:var(--tx2);margin-bottom:5px;}
.empty-sub{font-size:12px;}

/* ── MODAL ── */
.modal-backdrop{display:none;position:fixed;inset:0;background:#000c;z-index:999;
  align-items:center;justify-content:center;padding:16px;}
.modal-backdrop.show{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;
  width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-head{padding:13px 17px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--bdr);font-weight:600;font-size:15px;}
.modal-close{background:none;border:none;color:var(--tx2);font-size:17px;cursor:pointer;}
.modal-close:hover{color:var(--red);}
.modal-body{padding:17px;}
.step-bar{display:flex;align-items:center;margin-bottom:18px;}
.step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:13px;background:var(--bg3);border:2px solid var(--bdr);color:var(--tx2);}
.step-dot.done{background:var(--acc);border-color:var(--acc);color:#000;}
.step-line{flex:1;height:2px;background:var(--bdr);margin:0 8px;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:12px;}
.modal-p{font-size:12px;color:var(--tx2);margin-bottom:8px;line-height:1.6;}
.modal-steps{padding-left:18px;color:var(--tx);font-size:12px;line-height:2.1;}
.code-block{background:#0d1117;border:1px solid var(--bdr);border-radius:6px;padding:11px;
  font-family:var(--mono);font-size:11px;color:#7ee787;white-space:pre-wrap;
  overflow-x:auto;margin:10px 0;}
.url-input{width:100%;background:var(--bg3);border:1px solid var(--bdr);color:var(--tx);
  padding:9px 11px;border-radius:var(--r);font-family:var(--mono);font-size:12px;margin-bottom:5px;}
.url-input:focus{outline:none;border-color:var(--acc);}
.url-warn{font-size:11px;color:var(--warn);margin-bottom:8px;}
.modal-acts{display:flex;gap:7px;margin-top:10px;}
.btn-prim{background:var(--acc);color:#000;border:none;padding:8px 20px;border-radius:var(--r);font-weight:700;cursor:pointer;font-size:13px;margin-top:13px;}
.btn-sec{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx2);padding:7px 16px;border-radius:var(--r);cursor:pointer;font-size:13px;}
.btn-ok{background:var(--grn);color:#000;border:none;padding:7px 20px;border-radius:var(--r);font-weight:700;cursor:pointer;font-size:13px;}
.btn-ok:disabled{opacity:.4;cursor:not-allowed;}
.section-title{font-size:16px;font-weight:700;margin-bottom:0;}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="brand">
    <span class="brand-icon">◈</span>
    <div class="brand-text">
      <div class="brand-name">Waste<span>Hub</span></div>
      <div class="brand-sub">Production Monitoring</div>
    </div>
  </div>
  <div class="tp-controls">
    <div class="ctrl">
      <span class="ctrl-lbl">Grup</span>
      <div class="pills" id="grp-pills">
        <button class="pill on" data-grp="A">A</button>
        <button class="pill" data-grp="B">B</button>
        <button class="pill" data-grp="C">C</button>
      </div>
    </div>
    <div class="ctrl">
      <span class="ctrl-lbl">Tanggal</span>
      <input type="date" class="date-inp" id="inp-date"/>
    </div>
    <div class="ctrl">
      <span class="ctrl-lbl">Shift</span>
      <div class="pills" id="shift-pills">
        <button class="pill shift-on" data-shift="1">1</button>
        <button class="pill" data-shift="2">2</button>
        <button class="pill" data-shift="3">3</button>
      </div>
      <span class="shift-lbl" id="shift-lbl">06:00–14:00</span>
    </div>
  </div>
  <div class="tp-stats">
    <div class="stat"><span class="stat-l">Output</span><span class="stat-v" id="stat-output">0</span></div>
    <div class="stat"><span class="stat-l">Waste %</span><span class="stat-v" id="stat-pct">—</span></div>
    <div class="stat"><span class="stat-l">GF</span><span class="stat-v" id="stat-gf">0</span></div>
    <div class="stat"><span class="stat-l">Kardus</span><span class="stat-v" id="stat-kardus">0</span></div>
  </div>
  <div class="tp-btns">
    <button class="btn-icon" id="btn-sheets-cfg" title="Pengaturan Sheets">⚙</button>
    <button class="btn-sheets" id="btn-sheets">→ Sheets</button>
    <button class="btn-xlsx" id="btn-xlsx">⬇ XLSX</button>
  </div>
</div>

<div class="line-bar">

<div id="main">

  <div id="tab-counter" style="display:none"></div>
  <div id="tab-gf" style="display:none"></div>
  <div id="tab-kardus" style="display:none"></div>

<div class="modal-backdrop" id="sheets-modal">
  <div class="modal">

      <span>☁ Koneksi Google Drive</span>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════════
const LINE_CONFIG = {
  C1:{machines:["D3","D4","D5","D6"],    variants:["77yb"]},
  C2:{machines:["D1","D2","D7","D8"],    variants:["77yb"]},
  C3:{machines:["D9","D10","D12","D14"], variants:["77yb","77bb"]},
  C5:{machines:["D11","D13","D16","D17"],variants:["77bb"]},
  D2:{machines:["F1"],                   variants:["250","270"]},
  D3:{machines:["F2"],                   variants:["550","700","725","1000"]},
  D4:{machines:["F3"],                   variants:["550","700","725","1000"]},
};
const PCS_PER_BOX={"77yb":48,"77bb":48,"250":24,"270":24,"550":12,"700":12,"725":12,"1000":12};
const WASTE_TYPES=["Gagal Filling Kotor Dalam","Gagal Filling Sobek","Gagal Filling Tersealing",
  "Pouch Bocor","Pouch Kembung","Tidak Ada Cooling","Berat Over/Under","Sealing NG","Seal Ngetrap","Bocor Pouch Sobek"];
const GF_VARIANTS=["77g","550g","1000g","270g","725g","77BB"];
const KARDUS_LINES=[
  {id:"LC1", label:"LC1",        variant:"77YB",      target:1},
  {id:"LC2", label:"LC2",        variant:"77YB",      target:1},
  {id:"LC3", label:"LC3",        variant:"77YB",      target:1},
  {id:"LC3B",label:"LC3 (77BB)", variant:"77BB",      target:1},
  {id:"LC5", label:"LC5",        variant:"77BB",      target:1},
  {id:"LD1", label:"LD1",        variant:"42g",       target:1},
  {id:"LD2", label:"LD2",        variant:"250g/280g", target:2},
  {id:"LD4", label:"LD4",        variant:"725g",      target:3},
  {id:"LD3", label:"LD3",        variant:"700g",      target:3},
  {id:"LD5", label:"LD5",        variant:"20g",       target:1},
  {id:"LD6", label:"LD6",        variant:"12,5g",     target:1},
];
const KARDUS_CAUSES=["Robek di CS","Robek di Modular","Robek di Gravity Roll","Robek pada saat Packing",
  "Sealing Double","Rusak dinaikkan dari Paletizing","Rusak akibat Nandon","Akibat Tertabrak","Lainnya"];
const SHIFTS_MAP={"1":"06:00–14:00","2":"14:00–22:00","3":"22:00–06:00"};
const ALL_LINES=Object.keys(LINE_CONFIG);
// ── Pre-configured Drive (hardcoded, no setup needed) ──
const DEFAULT_DRIVE_URL="https://script.google.com/macros/s/AKfycbz4cGCobsI8SjtJz1A0zIvtmF3L3C4NAK-Uc8fNPR8n7h4r-R8ZMZvpJe8YBMYhyOEv/exec";
const DEFAULT_FOLDER_ID="1CzNjJIymT9cOfwDEV7oHESt80kDOR9iN";

// ══════════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════════
const S = {
  header:{group:"A",date:new Date().toISOString().split("T")[0],shift:"1"},
  lineShared:{},   // {line: {variant, outputByVariant:{}, sampelQC, slQC, hasilHeater, wasteFilling}}
  entries:[],      // [{id, line, machine, waste:{}}]
  expandedPouch:{},// {id: bool}
  expandedLine:{}, // {line: bool}
  counter:{},      // {line: [{machine, counter, fg, boxAktual}]}
  expandedCounter:{},
  gf:{},           // {variant: {close, open}}
  kardus:{},       // {id: {total, causes:{}, expanded:bool}}
  expandedKardus:{},
  sheetsUrl: localStorage.getItem("sheetsUrl")||"https://script.google.com/macros/s/AKfycbz4cGCobsI8SjtJz1A0zIvtmF3L3C4NAK-Uc8fNPR8n7h4r-R8ZMZvpJe8YBMYhyOEv/exec",
};

const n=v=>parseInt(v)||0;
const pcsBox=(v)=>PCS_PER_BOX[v]||1;
function calcLineOutput(line){
  const sh=S.lineShared[line]; if(!sh) return 0;
  return Object.entries(sh.outputByVariant).reduce((s,[v,b])=>s+(n(b)*pcsBox(v)),0);
}
function calcTotalWaste(waste){return WASTE_TYPES.reduce((s,t)=>s+(n(waste[t])),0);}
function pctStr(w,p){if(!p)return "—";return ((w/p)*100).toFixed(2)+"%";}
function pctColor(w,p){if(!p)return "#8b949e";const r=(w/p)*100;return r>5?"#f85149":r>2?"#f0883e":"#3fb950";}

// ══════════════════════════════════════════════════════════════════
// HELPERS: empty states
// ══════════════════════════════════════════════════════════════════
function emptyLineShared(line){
  const variants=LINE_CONFIG[line].variants;
  const obv={};
  variants.forEach(v=>{obv[v]="";});
  return {variant:variants[0],outputByVariant:obv,sampelQC:"",slQC:"",hasilHeater:"",wasteFilling:""};
}
function emptyWaste(){const w={};WASTE_TYPES.forEach(t=>{w[t]="";});return w;}
function emptyKardusLine(){const c={};KARDUS_CAUSES.forEach(x=>{c[x]="";});return{total:"",causes:c};}

function ensureLineShared(line){
  if(!S.lineShared[line]) S.lineShared[line]=emptyLineShared(line);
}
function ensureCounter(line){
  if(!S.counter[line]) S.counter[line]=LINE_CONFIG[line].machines.map(m=>({machine:m,counter:"",fg:"",boxAktual:""}));
}

// ══════════════════════════════════════════════════════════════════
// TOPBAR STATS
// ══════════════════════════════════════════════════════════════════
function updateStats(){
  const totalOutput=Object.keys(S.lineShared).reduce((s,l)=>s+calcLineOutput(l),0);
  const totalWaste=S.entries.reduce((s,e)=>s+calcTotalWaste(e.waste),0);
  const gfTotal=GF_VARIANTS.reduce((s,v)=>s+(n(S.gf[v]?.close))+(n(S.gf[v]?.open)),0);
  const kardusTotal=KARDUS_LINES.reduce((s,kl)=>s+n((S.kardus[kl.id]||emptyKardusLine()).total),0);
  document.getElementById("stat-output").textContent=totalOutput.toLocaleString();
  document.getElementById("stat-pct").textContent=totalOutput?((totalWaste/totalOutput)*100).toFixed(2)+"%":"—";
  document.getElementById("stat-gf").textContent=gfTotal.toLocaleString();
  document.getElementById("stat-kardus").textContent=kardusTotal.toLocaleString();
}

// ══════════════════════════════════════════════════════════════════
// LINE BAR
// ══════════════════════════════════════════════════════════════════
function renderLineBar(){
  const lp=document.getElementById("line-pills");
  const mp=document.getElementById("machine-pills");
  lp.innerHTML="";
  mp.innerHTML="";
  ALL_LINES.forEach(line=>{
    const isOn=S.entries.some(e=>e.line===line);
    const cnt=S.entries.filter(e=>e.line===line).length;
    const tot=LINE_CONFIG[line].machines.length;
    const btn=document.createElement("button");
    btn.className="lp"+(isOn?" on":"");
    btn.innerHTML=line+(isOn?`<span class="lp-cnt">${cnt}/${tot}</span>`:"");
    btn.title=LINE_CONFIG[line].machines.join(", ");
    btn.onclick=()=>toggleLine(line);
    lp.appendChild(btn);
  });
  const activeLines=[...new Set(S.entries.map(e=>e.line))];
  activeLines.forEach(line=>{
    const g=document.createElement("div");
    g.className="mpg";
    g.innerHTML=`<span class="mpg-lbl">${line}</span>`;
    LINE_CONFIG[line].machines.forEach(m=>{
      const isOn=S.entries.some(e=>e.line===line&&e.machine===m);
      const b=document.createElement("button");
      b.className="mp"+(isOn?" on":"");
      b.textContent=m;
      b.onclick=()=>toggleMachine(line,m);
      g.appendChild(b);
    });
    mp.appendChild(g);
  });
}

// ══════════════════════════════════════════════════════════════════
// TOGGLE LINE / MACHINE
// ══════════════════════════════════════════════════════════════════
function toggleLine(line){
  const existing=S.entries.filter(e=>e.line===line);
  if(existing.length>0){
    S.entries=S.entries.filter(e=>e.line!==line);
    delete S.counter[line];
  } else {
    ensureLineShared(line);
    ensureCounter(line);
    LINE_CONFIG[line].machines.forEach(m=>{
      S.entries.push({id:`${line}-${m}-${Date.now()}`,line,machine:m,waste:emptyWaste()});
    });
    S.expandedLine[line]=true;
  }
  renderAll();
}

function toggleMachine(line,machine){
  const existing=S.entries.find(e=>e.line===line&&e.machine===machine);
  if(existing){
    S.entries=S.entries.filter(e=>!(e.line===line&&e.machine===machine));
    if(S.counter[line]) S.counter[line]=S.counter[line].filter(x=>x.machine!==machine);
  } else {
    ensureLineShared(line);
    S.entries.push({id:`${line}-${machine}-${Date.now()}`,line,machine,waste:emptyWaste()});
    ensureCounter(line);
    if(!S.counter[line].find(x=>x.machine===machine)){
      S.counter[line].push({machine,counter:"",fg:"",boxAktual:""});
    }
  }
  renderAll();
}

// ══════════════════════════════════════════════════════════════════
// RENDER ALL
// ══════════════════════════════════════════════════════════════════
function renderAll(){
  renderLineBar();
  renderPouchTab();
  renderCounterTab();
  renderGFTab();
  renderKardusTab();
  renderSummaryTab();
  updateStats();
}

// ══════════════════════════════════════════════════════════════════
// COLLAPSIBLE CARD HELPERS
// ══════════════════════════════════════════════════════════════════
function makeCard(id, headHTML, bodyHTML, isOpen, onToggle){
  return `
  <div class="card" id="card-${id}">
    <div class="card-head${isOpen?" open":""}" onclick="${onToggle}">
      ${headHTML}
      <span class="caret">${isOpen?"▲":"▼"}</span>
    </div>
    <div class="card-body${isOpen?" open":""}">${bodyHTML}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════════
// TAB: WASTE POUCH
// ══════════════════════════════════════════════════════════════════
function renderPouchTab(){
  const el=document.getElementById("tab-pouch");
  const byLine={};
  S.entries.forEach(e=>{if(!byLine[e.line])byLine[e.line]=[];byLine[e.line].push(e);});
  if(!Object.keys(byLine).length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📦</div><div class="empty-title">Belum ada line dipilih</div><div class="empty-sub">Klik tombol line di atas untuk mulai</div></div>`;
    return;
  }
  let html="";
  Object.entries(byLine).forEach(([line,entries])=>{
    const sh=S.lineShared[line]||emptyLineShared(line);
    const lineOp=calcLineOutput(line);
    const lineTw=entries.reduce((s,e)=>s+calcTotalWaste(e.waste),0);
    const pc=pctColor(lineTw,lineOp);
    const isLineOpen=S.expandedLine[line]!==false;

    // LSP HTML
    const variants=LINE_CONFIG[line].variants;
    let varHTML="";
    if(variants.length>1){
      varHTML=`<div class="field"><label>Varian Aktif</label><div class="vpills">${
        variants.map(v=>`<button class="vp${sh.variant===v?" on":""}" onclick="setVariant('${line}','${v}')">${v}</button>`).join("")
      }</div></div>`;
    } else {
      varHTML=`<div class="field"><label>Varian</label><div class="fixed-tag">${variants[0]}</div></div>`;
    }
    let outHTML=variants.map(v=>{
      const pcs=(n(sh.outputByVariant[v]))*pcsBox(v);
      return `<div class="field"><label>Output ${v} (Box)</label>
        <div style="display:flex;gap:6px;align-items:center">
          <input type="number" min="0" class="num-in" value="${sh.outputByVariant[v]||""}"
            oninput="setOutputVariant('${line}','${v}',this.value)" placeholder="0"/>
          ${pcs>0?`<span class="pcs-tag">${pcs.toLocaleString()} pcs</span>`:""}
        </div></div>`;
    }).join("");
    const lspHTML=`
    <div class="lsp">
      <div class="lsp-hdr">
        <span class="lsp-badge">Line ${line}</span>
        <span class="lsp-sub">Output & QC — semua mesin</span>
        ${lineOp>0?`<span class="lsp-pcs">Total: <b>${lineOp.toLocaleString()} pcs</b></span>`:""}
      </div>
      <div class="sec-lbl">📦 Output per Varian</div>
      <div class="field-row">${varHTML}${outHTML}</div>
      <div class="sec-lbl">🔬 Data QC</div>
      <div class="field-row">
        ${[["Sampel QC","sampelQC"],["SL QC","slQC"],["Hasil Heater","hasilHeater"],["Waste Filling","wasteFilling"]].map(([lbl,key])=>`
        <div class="field"><label>${lbl}</label>
          <input type="number" min="0" class="num-in" value="${sh[key]||""}"
            oninput="setSharedQC('${line}','${key}',this.value)" placeholder="0"/>
        </div>`).join("")}
      </div>
    </div>`;

    // Machine cards
    let machineHTML="";
    entries.forEach(e=>{
      const tw=calcTotalWaste(e.waste);
      const pc2=pctColor(tw,lineOp);
      const isOpen=S.expandedPouch[e.id]!==false;
      const headL=`<div class="card-head-left">
        <span class="tag-m">${e.machine}</span>
        <span class="tag-v">${sh.variant}</span>
        ${tw>0?`<span class="tag-w">${tw.toLocaleString()} pcs</span>`:""}
      </div>`;
      const headR=`<div class="card-head-right">
        ${lineOp>0?`<span class="pct-pill" style="color:${pc2};background:${pc2}22;border:1px solid ${pc2}">${pctStr(tw,lineOp)}</span>`:""}
        <button class="btn-del" onclick="event.stopPropagation();removeEntry('${e.id}')">✕</button>
      </div>`;
      const bodyHTML2=`
      <div class="waste-body">
        <div class="machine-tag">Mesin ${e.machine} · ${sh.variant}</div>
        <table class="wt">
          <thead><tr><th class="th-name">Jenis Waste</th><th class="th-tot">Total (pcs)</th></tr></thead>
          <tbody>${WASTE_TYPES.map((t,ri)=>{
            const val=e.waste[t]||"";
            const isAct=n(val)>0;
            return `<tr class="${isAct?"row-act":""}">
              <td class="td-name">${t}</td>
              <td class="td-val"><input type="number" min="0" class="wi" value="${val}"
                data-eid="${e.id}" data-type="${t}" data-ri="${ri}"
                oninput="setWaste('${e.id}','${t}',this.value)"
                onkeydown="wasteEnter(event,this)"
                onfocus="this.select()" placeholder="0"/></td>
            </tr>`;
          }).join("")}</tbody>
          <tfoot><tr class="tf-row">
            <td class="td-name"><b>TOTAL WASTE</b></td>
            <td class="td-val"><span class="tw-num">${tw.toLocaleString()}</span></td>
          </tr></tfoot>
        </table>
        <div class="hint">↵ Enter = jenis waste berikutnya</div>
        ${lineOp>0?`<div class="tw-sum"><span>Total ${e.machine}:</span><b style="color:${pc2}">${tw.toLocaleString()} pcs</b>
          <span class="pct-pill" style="color:${pc2};background:${pc2}22;border:1px solid ${pc2}">${pctStr(tw,lineOp)}</span></div>`:""}
      </div>`;
      machineHTML+=makeCard(`pouch-${e.id}`,headL+headR,bodyHTML2,isOpen,`togglePouch('${e.id}')`);
    });

    const headL=`<div class="card-head-left">
      <span style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--acc)">Line ${line}</span>
      <span class="tag-v">${sh.variant}</span>
      <span style="font-size:11px;color:var(--tx3)">${entries.length} mesin</span>
    </div>`;
    const headR=`<div class="card-head-right">
      <span class="sum-stat">Output <b>${lineOp.toLocaleString()} pcs</b></span>
      <span class="pct-pill" style="color:${pc};background:${pc}22;border:1px solid ${pc}">${pctStr(lineTw,lineOp)}</span>
    </div>`;
    html+=makeCard(`line-${line}`,headL+headR,lspHTML+`<div style="border-top:1px solid var(--bdr)">${machineHTML}</div>`,isLineOpen,`toggleLineCard('${line}')`);
  });
  el.innerHTML=html;
}

function toggleLineCard(line){S.expandedLine[line]=!S.expandedLine[line]; renderPouchTab();}
function togglePouch(id){S.expandedPouch[id]=S.expandedPouch[id]===false?true:false; renderPouchTab();}

function setVariant(line,v){S.lineShared[line].variant=v; renderAll();}
function setOutputVariant(line,v,val){S.lineShared[line].outputByVariant[v]=val; renderAll();}
function setSharedQC(line,key,val){S.lineShared[line][key]=val; updateStats();}
function setWaste(id,type,val){
  const e=S.entries.find(x=>x.id===id);
  if(e){e.waste[type]=val;}
  // update just this entry's totals without full re-render
  const tw=calcTotalWaste(e.waste);
  const sh=S.lineShared[e.line]||emptyLineShared(e.line);
  const lp=calcLineOutput(e.line);
  const pc=pctColor(tw,lp);
  // update tw-num in same card
  const card=document.getElementById(`card-pouch-${id}`);
  if(card){
    card.querySelector(".tw-num").textContent=tw.toLocaleString();
    const pill=card.querySelector(".tw-sum .pct-pill");
    if(pill){pill.textContent=pctStr(tw,lp);pill.style.color=pc;pill.style.background=pc+"22";pill.style.border=`1px solid ${pc}`;}
    const twB=card.querySelector(".tw-sum b");
    if(twB){twB.textContent=tw.toLocaleString()+" pcs";twB.style.color=pc;}
    // row color
    const inputs=card.querySelectorAll("input.wi");
    inputs.forEach(inp=>{
      const row=inp.closest("tr");
      if(row) row.className=n(inp.value)>0?"row-act":"";
    });
    // head tag-w
    const tagW=card.querySelector(".tag-w");
    if(tw>0){
      if(tagW) tagW.textContent=tw.toLocaleString()+" pcs";
      else{
        const head=card.querySelector(".card-head-left");
        const sp=document.createElement("span");sp.className="tag-w";sp.textContent=tw.toLocaleString()+" pcs";
        head.appendChild(sp);
      }
    } else if(tagW) tagW.remove();
  }
  updateStats();
  renderSummaryTab();
}

function removeEntry(id){
  S.entries=S.entries.filter(e=>e.id!==id);
  const line=id.split("-")[0]+"-"+id.split("-")[1];
  renderAll();
}

function wasteEnter(ev, inp){
  if(ev.key!=="Enter") return;
  ev.preventDefault();
  const ri=parseInt(inp.dataset.ri);
  const eid=inp.dataset.eid;
  const card=document.getElementById(`card-pouch-${eid}`);
  if(!card) return;
  const inputs=Array.from(card.querySelectorAll("input.wi"));
  const next=inputs[ri+1];
  if(next){next.focus();next.select();}
  else {
    // move to next card
    const cards=document.querySelectorAll('[id^="card-pouch-"]');
    const arr=Array.from(cards);
    const idx=arr.indexOf(card);
    const nextCard=arr[idx+1];
    if(nextCard){
      const cid=nextCard.id.replace("card-pouch-","");
      S.expandedPouch[cid]=true;
      renderPouchTab();
      setTimeout(()=>{
        const nc=document.getElementById(`card-pouch-${cid}`);
        const fi=nc?.querySelector("input.wi");
        fi?.focus();fi?.select();
      },60);
    }
  }
}

// ══════════════════════════════════════════════════════════════════
// TAB: COUNTER
// ══════════════════════════════════════════════════════════════════
function renderCounterTab(){
  const el=document.getElementById("tab-counter");
  const activeLines=[...new Set(S.entries.map(e=>e.line))];
  if(!activeLines.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">🔢</div><div class="empty-title">Belum ada line aktif</div><div class="empty-sub">Aktifkan line di atas</div></div>`;
    return;
  }
  let html="";
  activeLines.forEach(line=>{
    const sh=S.lineShared[line]||emptyLineShared(line);
    const variant=sh.variant;
    const ppb=pcsBox(variant);
    const machines=S.counter[line]||LINE_CONFIG[line].machines.map(m=>({machine:m,counter:"",fg:"",boxAktual:""}));
    const totalCounter=machines.reduce((s,m)=>s+n(m.counter),0);
    const outputPcs=calcLineOutput(line);
    const isOpen=S.expandedCounter[line]!==false;

    const rows=machines.map((m,mi)=>{
      const ctr=n(m.counter);
      const fg=n(m.fg);
      const boxAktual=n(m.boxAktual);
      const selBox=(boxAktual-fg).toFixed(0);
      const selPcs=((boxAktual-fg)*ppb).toFixed(0);
      const selColor=Number(selBox)<0?"#f85149":Number(selBox)===0?"#8b949e":"#3fb950";
      return `<tr>
        <td><span class="tag-m">${m.machine}</span></td>
        <td><input type="number" min="0" class="wi" value="${m.counter||""}"
          oninput="setCounter('${line}',${mi},'counter',this.value)"

}

function gfEnter(ev,vi,field){
  if(ev.key!=="Enter")return; ev.preventDefault();
  if(field==="close"){
    document.querySelectorAll(`[onkeydown*="gfEnter(event,${vi},'open'"]`)[0]?.focus();

  } else {
    const next=document.querySelectorAll(`[onkeydown*="gfEnter(event,${vi+1},'close'"]`)[0];
    next?.focus();next?.select();
  }
}

  renderKardusTab();
  updateStats();
}

function setKardusCause(id,cause,val){
  if(!S.kardus[id]) S.kardus[id]=emptyKardusLine();
  S.kardus[id].causes[cause]=val;
  renderKardusTab();
  updateStats();
}

function kardusEnter(ev,li,ci){
  if(ev.key!=="Enter")return; ev.preventDefault();
  const kl=KARDUS_LINES[li];
  if(ci<KARDUS_CAUSES.length-1){
    const nextC=KARDUS_CAUSES[ci+1];
    const inp=document.querySelector(`[oninput*="setKardusCause('${kl.id}','${nextC}'"]`);
    inp?.focus();inp?.select();

    const nextKL=KARDUS_LINES[li+1];

function renderSummaryTab(){
  const el=document.getElementById("tab-summary");
  const totalOutput=Object.keys(S.lineShared).reduce((s,l)=>s+calcLineOutput(l),0);
  const totalWaste=S.entries.reduce((s,e)=>s+calcTotalWaste(e.waste),0);
  const gfClose=GF_VARIANTS.reduce((s,v)=>s+n(S.gf[v]?.close),0);
  const gfOpen=GF_VARIANTS.reduce((s,v)=>s+n(S.gf[v]?.open),0);
  const kardusTotal=KARDUS_LINES.reduce((s,kl)=>s+n((S.kardus[kl.id]||emptyKardusLine()).total),0);
  const gPct=totalOutput?((totalWaste/totalOutput)*100).toFixed(2)+"%":"—";
  const activeLines=[...new Set(S.entries.map(e=>e.line))];
  const byLine={};
  S.entries.forEach(e=>{if(!byLine[e.line])byLine[e.line]=[];byLine[e.line].push(e);});

  // KPIs
  const kpis=[
    ["Mesin Aktif",S.entries.length,false],
    ["Output (Pcs)",totalOutput.toLocaleString(),false],
    ["Waste Pouch",totalWaste.toLocaleString(),false],
    ["% Waste",gPct,true],
    ["GF Close",gfClose.toLocaleString(),false],
    ["GF Open",gfOpen.toLocaleString(),false],
    ["Waste Kardus",kardusTotal.toLocaleString(),false],
  ];
  const kpiHTML=`<div class="kpi-row">${kpis.map(([l,v,hi])=>`
    <div class="kpi${hi?" hi":""}"><div class="kpi-v">${v}</div><div class="kpi-l">${l}</div></div>`).join("")}</div>`;

  // Waste pouch per line
  const pouchRows=Object.entries(byLine).map(([line,entries])=>{
    const sh=S.lineShared[line]||emptyLineShared(line);
    const op=calcLineOutput(line);
    const tw=entries.reduce((s,e)=>s+calcTotalWaste(e.waste),0);
    const pc=pctColor(tw,op);
    return `<div class="sum-row">
      <span class="tag-m">Line ${line}</span><span class="tag-v">${sh.variant}</span>
      <span class="sum-stat">Output: <b>${op.toLocaleString()} pcs</b></span>
      <span class="sum-stat">Waste: <b style="color:${pc}">${tw.toLocaleString()} pcs</b></span>
      <span class="pct-pill" style="color:${pc};background:${pc}22;border:1px solid ${pc}">${pctStr(tw,op)}</span>
    </div>`;
  }).join("") || `<div class="sum-row" style="color:var(--tx3);font-size:12px">Belum ada data</div>`;

  // GF rows
  const gfRows=GF_VARIANTS.filter(v=>n(S.gf[v]?.close)||n(S.gf[v]?.open)).map(v=>{
    const c=n(S.gf[v]?.close), o=n(S.gf[v]?.open);
    return `<div class="sum-row">
      <span class="tag-v">${v}</span>
      <span class="sum-stat">Close: <b style="color:var(--grn)">${c}</b></span>
      <span class="sum-stat">Open: <b style="color:var(--warn)">${o}</b></span>
      <span class="sum-stat">Total: <b>${c+o}</b></span>
    </div>`;
  }).join("") || `<div class="sum-row" style="color:var(--tx3);font-size:12px">Tidak ada gagal filling</div>`;

  // Kardus rows
  const kardusRows=KARDUS_LINES.map(kl=>{
    const d=S.kardus[kl.id]||emptyKardusLine();
    const tot=n(d.total), ok=tot<=kl.target;
    return `<div class="sum-row">
      <span class="tag-m">${kl.label}</span><span class="tag-v">${kl.variant}</span>
      <span class="sum-stat"><b>${tot}</b> / ${kl.target} target</span>
      <span class="${ok?"status-ok":"status-over"}">${ok?"✓ OK":"✗ OVER"}</span>
    </div>`;
  }).join("");

  // Breakdown waste
  const bdRows=WASTE_TYPES.map(t=>{
    const tot=S.entries.reduce((s,e)=>s+n(e.waste[t]),0);
    const pct=totalWaste?(tot/totalWaste*100).toFixed(1):0;
    return `<div class="bd-row">
      <div class="bd-name">${t}</div>
      <div class="bd-bar-bg"><div class="bd-bar" style="width:${pct}%"></div></div>
      <div class="bd-nums"><span>${tot.toLocaleString()}</span><span class="bd-pct">${pct}%</span></div>
    </div>`;
  }).join("");

  el.innerHTML=`
  ${kpiHTML}
  <div class="sum-block"><div class="sum-block-title">📦 Waste Pouch per Line</div>${pouchRows}</div>
  <div class="sum-block"><div class="sum-block-title">⚠ Gagal Filling</div>${gfRows}</div>
  <div class="sum-block"><div class="sum-block-title">📋 Waste Kardus per Line</div>${kardusRows}</div>
  ${totalWaste>0?`<div class="sum-block"><div class="sum-block-title">📊 Breakdown Jenis Waste Pouch</div><div class="bd-grid">${bdRows}</div></div>`:""}`;
}

// ══════════════════════════════════════════════════════════════════
function exportXLSX(){
  if(!window.XLSX){alert("SheetJS belum load, coba refresh.");return;}
  const XLSX=window.XLSX;
  const hdr=["Grup:",S.header.group,"Tanggal:",S.header.date,"Shift:",`Shift ${S.header.shift}`];
  const wb=XLSX.utils.book_new();

  // Sheet 1: Waste Pouch
  const ws1=[["WASTE POUCH REPORT"],hdr,[]];
  ws1.push(["Line","Mesin","Varian","Output(Box)","Output(Pcs)",...WASTE_TYPES,"Total Waste","% Waste","Sampel QC","SL QC","Hasil Heater","Waste Filling"]);
  S.entries.forEach(e=>{
    const sh=S.lineShared[e.line]||emptyLineShared(e.line);
    const pcs=calcLineOutput(e.line), tw=calcTotalWaste(e.waste);
    ws1.push([e.line,e.machine,sh.variant,
      Object.values(sh.outputByVariant).reduce((s,v)=>n(v)+s,0),pcs,
      ...WASTE_TYPES.map(t=>n(e.waste[t])),tw,
      pcs?(tw/pcs*100).toFixed(2)+"%":"0%",
      n(sh.sampelQC),n(sh.slQC),n(sh.hasilHeater),n(sh.wasteFilling)]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws1),"Waste Pouch");

  // Sheet 2: Counter
  const ws2=[["DATA COUNTER MESIN"],hdr,[]];
  ws2.push(["Line","Mesin","Varian","Counter","FG","Box Aktual","Selisih Box","Selisih Pcs"]);
  Object.entries(S.counter).forEach(([line,machines])=>{
    const sh=S.lineShared[line]||emptyLineShared(line);
    const ppb=pcsBox(sh.variant);
    machines.forEach(m=>{
      const selBox=n(m.boxAktual)-n(m.fg);
      ws2.push([line,m.machine,sh.variant,n(m.counter),n(m.fg),n(m.boxAktual),selBox,selBox*ppb]);
    });
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws2),"Counter Mesin");

  // Sheet 3: Gagal Filling
  const ws3=[["DATA PENGERJAAN GAGAL FILLING"],hdr,[]];
  ws3.push(["Varian","Close (pcs)","Open (pcs)","Total"]);
  GF_VARIANTS.forEach(v=>{
    const c=n(S.gf[v]?.close), o=n(S.gf[v]?.open);
    ws3.push([v,c,o,c+o]);
  });
  ws3.push(["TOTAL",GF_VARIANTS.reduce((s,v)=>s+n(S.gf[v]?.close),0),
    GF_VARIANTS.reduce((s,v)=>s+n(S.gf[v]?.open),0),
    GF_VARIANTS.reduce((s,v)=>s+n(S.gf[v]?.close)+n(S.gf[v]?.open),0)]);
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws3),"Gagal Filling");

  // Sheet 4: Kardus
  const ws4=[["WASTE KARDUS PERSHIFT"],hdr,[]];
  ws4.push(["Line","Varian","Total Waste","Target","Status",...KARDUS_CAUSES]);
  KARDUS_LINES.forEach(kl=>{
    const d=S.kardus[kl.id]||emptyKardusLine();
    const tot=n(d.total);
    ws4.push([kl.label,kl.variant,tot,kl.target,tot<=kl.target?"OK":"OVER",...KARDUS_CAUSES.map(c=>n(d.causes[c]))]);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(ws4),"Waste Kardus");

  XLSX.writeFile(wb,`WasteHub_Grp${S.header.group}_Shift${S.header.shift}_${S.header.date}.xlsx`);
}

function doPost(e) {
  try {
    const p = JSON.parse(e.postData.contents);
    if (p.action === "save") return saveFile(p);
    return out({status:"error", msg:"unknown action"});
  } catch(err) { return out({status:"error", msg:err.toString()}); }
}

function saveFile(p) {
  const name   = p.fileName;
  const body   = JSON.stringify(p.data, null, 2);
  const folder = p.folderId
    ? DriveApp.getFolderById(p.folderId)
    : DriveApp.getRootFolder();
  const iter = folder.getFilesByName(name);
  if (iter.hasNext()) { iter.next().setContent(body); }
  else { folder.createFile(name, body, MimeType.PLAIN_TEXT); }
  return out({status:"ok", fileName: name});
}

function out(obj) {
  return ContentService
    .createTextOutput(JSON.stringify(obj))
    .setMimeType(ContentService.MimeType.JSON);

  </div>
  ${step===0?`
    <h3 class="modal-title">✅ Drive sudah terkonfigurasi</h3>
    <div style="background:#1c2d1c;border:1px solid var(--grn);border-radius:6px;padding:10px 13px;margin-bottom:12px;font-size:12px;color:var(--grn)">
      ✓ URL dan Folder ID sudah tertanam dalam kode ini.<br/>
      Perangkat lain tidak perlu setup ulang — cukup buka file HTML ini.
    </div>
    <p class="modal-p" style="color:var(--tx2)">Jika perlu update URL (misalnya redeploy Apps Script), paste URL baru di Step 2:</p>
    <ol class="modal-steps">
      <li>Buka <b>Google Sheets</b> baru → beri nama <em>"Database Waste Report"</em></li>
      <li>Klik menu <b>Extensions → Apps Script</b></li>
      <li>Hapus kode lama, paste kode berikut:</li>
    </ol>
    <div class="code-block">${GAS_CODE}</div>
    <ol class="modal-steps" start="4">
      <li>Klik <b>Deploy → New Deployment</b></li>
      <li>Type: <b>Web App</b> · Execute as: <b>Me</b></li>
      <li>Who has access: <b>Anyone</b></li>
      <li>Deploy → Authorize → Copy URL</li>
    </ol>
    <button class="btn-prim" onclick="document.getElementById('modal-body').innerHTML=renderModalStep(1)">Lanjut →</button>
  `:`
    <h3 class="modal-title">Paste URL Web App</h3>
    <p class="modal-p">URL dimulai: <code>https://script.google.com/macros/s/...</code></p>
    <input class="url-input" id="modal-url" type="text"
      placeholder="https://script.google.com/macros/s/AKfy..."
      value="${S.sheetsUrl}" oninput="checkUrl()"/>
    <p class="url-warn" id="url-warn" style="display:none">⚠ URL tidak valid</p>
    <div class="modal-acts">
      <button class="btn-sec" onclick="document.getElementById('modal-body').innerHTML=renderModalStep(0)">← Kembali</button>
      <button class="btn-ok" id="btn-save-url" onclick="saveUrl()" ${!S.sheetsUrl.includes("script.google.com")?"disabled":""}>✓ Simpan</button>
    </div>
  `}`;
}

function checkUrl(){
  const v=document.getElementById("modal-url").value;
  const valid=v.includes("script.google.com");
  document.getElementById("url-warn").style.display=v&&!valid?"block":"none";
  document.getElementById("btn-save-url").disabled=!valid;
}

function saveUrl(){
  S.sheetsUrl=document.getElementById("modal-url").value;
  localStorage.setItem("sheetsUrl",S.sheetsUrl);
  document.getElementById("btn-sheets-cfg").textContent="🔗";
  closeModal();
}

// ══════════════════════════════════════════════════════════════════
// HEADER CONTROLS
// ══════════════════════════════════════════════════════════════════
document.getElementById("inp-date").value=S.header.date;
document.getElementById("inp-date").oninput=function(){S.header.date=this.value;};

document.querySelectorAll("[data-grp]").forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll("[data-grp]").forEach(b=>b.classList.remove("on"));
    this.classList.add("on");
    S.header.group=this.dataset.grp;
  };
});

document.querySelectorAll("[data-shift]").forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll("[data-shift]").forEach(b=>b.classList.remove("shift-on"));
    this.classList.add("shift-on");
    S.header.shift=this.dataset.shift;
    document.getElementById("shift-lbl").textContent=SHIFTS_MAP[this.dataset.shift];
  };
});

document.querySelectorAll(".tab").forEach(btn=>{
  btn.onclick=function(){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("on"));
    this.classList.add("on");
    const tab=this.dataset.tab;
    ["pouch","counter","gf","kardus","summary"].forEach(t=>{
      document.getElementById("tab-"+t).style.display=t===tab?"block":"none";
    });
    if(tab==="summary") renderSummaryTab();
  };
});

document.getElementById("btn-sheets-cfg").onclick=openSheetsModal;
document.getElementById("modal-close-btn").onclick=closeModal;
document.getElementById("sheets-modal").onclick=function(e){if(e.target===this)closeModal();};
document.getElementById("btn-xlsx").onclick=exportXLSX;
document.getElementById("btn-sheets").onclick=async function(){
  const url=S.sheetsUrl||DEFAULT_DRIVE_URL;
  const btn=this;
  btn.disabled=true;btn.textContent="⟳ Mengirim…";
  try{
    const filename=`WasteHub_Grp${S.header.group}_Shift${S.header.shift}_${S.header.date}.json`;
    const payload={
      action:"save",
      folderId:DEFAULT_FOLDER_ID,
      fileName:filename,
      data:{
        savedAt:new Date().toISOString(),
        header:S.header,
        lineShared:S.lineShared,
        entries:S.entries,
        counter:S.counter,
        gf:S.gf,
        kardus:S.kardus
      }
    };
    await fetch(url,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)});
    // no-cors: cannot read response body, but no throw = sent
    alert("✓ Data berhasil dikirim ke Drive!\nFile: "+filename+"\nFolder ID: 1CzNjJIymT9cOfwDEV7oHESt80kDOR9iN");
  }catch(err){
    alert("✗ Gagal kirim ke Drive: "+err.message);
  }
  btn.disabled=false;btn.textContent="→ Sheets";
};

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
// Drive already configured — mark as connected
document.getElementById("btn-sheets-cfg").textContent="🔗";
document.getElementById("btn-sheets-cfg").title="Drive terhubung: folder 1CzNjJIy...";
renderAll();
</script>
</body>
</html>
